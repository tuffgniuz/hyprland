# ────── Modifier Definitions ──────
$mainMod = SUPER # Sets the "Windows" key as main modifier

# ────── Application Launchers ──────
bind = $mainMod, Return, exec, $terminal                     # Launch terminal
bind = $mainMod, W, exec, $browser                           # Launch browser
bind = $mainMod, O, exec, obsidian                           # Launch Obsidian
bind = $mainMod, R, exec, $menu                              # Launch custom menu (e.g., Rofi or wofi)
bind = $mainMod, E, exec, $filemanager                       # Launch Yazi (file manager) in Ghostty terminal
bind = $mainMod, X, exec, hyprlock                           # Lock screen
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, layoutmsg, mfact 0.5
bind = $mainMod, B, exec, ~/.local/bin/rofi-bookmarks
bind = $mainMod, V, exec, sh -c 'cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy'  # Clipboard history


# ────── Window Management ──────
bind = $mainMod SHIFT, C, killactive,

# Toggle floating. Only resize and center when entering floating mode.
bind = $mainMod SHIFT, Space, exec, sh -c 'window="$(hyprctl -j activewindow 2>/dev/null)" || exit 0; if printf "%s" "$window" | jq -e ".floating == true" >/dev/null; then hyprctl dispatch togglefloating; else hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 900 600 && hyprctl dispatch centerwindow; fi'

# ────── Window Focus Movement (Vim-style) ──────
bind = $mainMod, h, movefocus, l                           # Focus left
bind = $mainMod, l, movefocus, r                           # Focus right
bind = $mainMod, k, movefocus, u                           # Focus up
bind = $mainMod, j, movefocus, d                           # Focus down

# Swap windows in a direction
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# ────── Window Resizing ──────
bind = $mainMod SHIFT, R, submap, resize

submap = resize
# Sets repeatable binds for resizing the active window
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10

# use reset to go back to the global submap
bind = , escape, submap, reset 
submap = reset

# ────── Workspace Switching ──────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10                          # Switch to workspace 10

# ────── Move Windows to Workspaces ──────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10             # Move to workspace 10

# ────── Special Workspaces (e.g., Scratchpad) ──────
bind = $mainMod, S, togglespecialworkspace, slot1         # Toggle special workspace "slot1"
bind = $mainMod, A, togglespecialworkspace, slot2         # Toggle special workspace "slot2"
bind = $mainMod, D, togglespecialworkspace, slot3         # Toggle special workspace "slot3"
bind = $mainMod SHIFT, S, movetoworkspace, special:slot1  # Move window to special workspace
bind = $mainMod SHIFT, A, movetoworkspace, special:slot2  # Move window to special workspace
bind = $mainMod SHIFT, D, movetoworkspace, special:slot3  # Move window to special workspace

# ────── Workspace Scrolling with Mouse ──────
bind = $mainMod, mouse_down, workspace, e+1               # Scroll to next workspace
bind = $mainMod, mouse_up, workspace, e-1                 # Scroll to previous workspace

# ────── Mouse Bindings ──────
bindm = $mainMod, mouse:272, movewindow                   # Left-click drag to move window
bindm = $mainMod, mouse:273, resizewindow                 # Right-click drag to resize window

bind = $mainMod, P, exec, sh -c 'file="$HOME/media/images/screenshots/$(date +'"'"'%Y-%m-%d_%H-%M-%S'"'"').png"; grim "$file" && wl-copy < "$file" && notify-send "📸 Screenshot saved and copied"'
bind = $mainMod SHIFT, P, exec, sh -c 'file="$HOME/media/images/screenshots/$(date +'"'"'%Y-%m-%d_%H-%M-%S'"'"').png"; slurp | grim -g - "$file" && wl-copy < "$file" && notify-send "📸 Screenshot saved and copied"'

bindl = , XF86MonBrightnessUp, exec, brightnessctl s +5%  # Increase brightness
bindl = , XF86MonBrightnessDown, exec, brightnessctl s 5%-  # Decrease brightness

# ────── Media Keys: Volume ──────
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+    # Volume up
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-    # Volume down
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle && notify-send "Toggled Mute"      # Toggle mute
