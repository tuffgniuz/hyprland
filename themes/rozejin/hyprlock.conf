background {
    path = ~/media/wallpapers/rozejin/turtles.png
    blur_passes = 3
    noise = 0.018
    contrast = 1.0
    brightness = 0.82
    vibrancy = 0.18
    vibrancy_darkness = 0.35
}

general {
    hide_cursor = true
    no_fade_in = false
    grace = 2
    disable_input = false
    disable_fade = false
}

image {
    monitor =
    path = ~/media/images/Avatars/avatar_cartoon.png
    size = 150
    rounding = -1
    border_size = 4
    border_color = rgba(231, 185, 201, 1.0)
    position = 0, 200
    halign = center
    valign = center
    zindex = 1
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgb(234,223,226)
    font_size = 150
    font_family = Chango
    halign = center
    valign = center
}

label {
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    font_family = Quicksand
    font_size = 18
    color = rgb(200,183,187)
    position = 0, -120
    halign = center
    valign = center
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.25
    dots_center = true
    fade_on_empty = true
    placeholder_text = "Type your password..."
    font_family = VictorMono Nerd Font
    font_size = 16

    outer_color = rgba(67, 49, 58, 0.92)
    inner_color = rgba(29, 32, 33, 0.45)

    font_color = rgb(234,223,226)

    shadow_passes = 1
    position = 0, -180
    halign = center
    valign = center
}

animations {
    enabled = true
    bezier = feelgood, 0.25, 0.1, 0.25, 1.0

    animation = fadeIn,  1,  5, feelgood
    animation = fadeOut, 1,  5, feelgood
}

label {
    text = cmd[update:30000] echo "$(cat /sys/class/power_supply/BAT0/capacity)%"
    font_family = Chango
    font_size = 20
    color = rgb(200,183,187)
    position = -20, -20
    halign = right
    valign = top
}
