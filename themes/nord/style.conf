# ─────────────────────────────────────────────────────
# 🎨 General Appearance & Layout
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 1

    col.active_border = rgba(88c0d0cc)
    col.inactive_border = rgba(2e3440aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

# ─────────────────────────────────────────────────────
# 🪟 Window Decoration
decoration {
    rounding = 5

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 4
        passes = 2

        vibrancy = 0.12
    }
}

# ─────────────────────────────────────────────────────
# ✨ Animations
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,      1, 7, myBezier
    animation = windowsOut,   1, 7, default, popin 80%
    animation = border,       1, 10, default
    animation = borderangle,  1, 8, default
    animation = fade,         1, 7, default
    animation = workspaces,   1, 6, default
}

# ─────────────────────────────────────────────────────
# 🧩 Dwindle Tiling Settings
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

# ─────────────────────────────────────────────────────
# 🛠️ Misc Visual Tweaks
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
