# ─────────────────────────────────────────────────────
# 🖥️  Monitor Configuration
monitor = eDP-1, 1920x1080@60.01200, 0x449, 1

# ─────────────────────────────────────────────────────
# ⚙️  App Defaults
$terminal     = ghostty                       # Preferred terminal emulator
$browser      = firefox                       # Preferred browser
$filemanager  = ghostty -e yazi               # Preferred file manager
$menu         = rofi -show drun -show-icons   # App launcher with icons



# ─────────────────────────────────────────────────────
# 📦 Modular Configuration
# Split into logical files for cleaner organization
source = ~/.config/hypr/autostart.conf      # Autostart apps/services
source = ~/.config/hypr/env.conf            # Environment variables
source = ~/.config/hypr/style.conf          # Style: colors, animations, etc.
source = ~/.config/hypr/input.conf          # Keyboard, mouse, touchpad settings
source = ~/.config/hypr/keybindings.conf    # Custom keybindings
source = ~/.config/hypr/rules.conf          # App-specific rules and behavior
